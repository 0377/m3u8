name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GOFLAGS: -mod=vendor

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Verify vendor
        run: test -f vendor/modules.txt

      - name: Go vet
        run: go vet ./...

      - name: Run tests
        run: make test

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/m3u8-linux-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/m3u8-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/m3u8-windows-amd64.exe .

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
